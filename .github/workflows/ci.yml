name: Cookimate CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: cookimate-backend
        run: npm install --legacy-peer-deps

      - name: Verify backend dependencies installed
        run: echo "Backend dependencies installed successfully"

  check-frontend:
    name: Frontend (React Native) Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install frontend dependencies
        working-directory: cookimate-frontend/frontend
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Check Expo configuration
        working-directory: cookimate-frontend/frontend
        run: npx expo config --type public

      - name: Verify frontend build readiness
        run: echo "Frontend checks completed successfully"